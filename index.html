<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ช่องทางติดต่อสำรอง</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="page">

    <!-- Section 1: LOGO -->
    <section class="section logo-section">
      <img src="assets/zood24_logo_new.png" alt="Logo" class="logo-img" />
    </section>

    <!-- Section 2: Banner -->
    <section class="section banner-section">
      <img src="assets/banner.webp" alt="ช่องทางติดต่อสำรอง" class="banner-img" />
    </section>

    <!-- Section 3: Text -->
    <section class="section text-section">
      <div class="badge">🟢ช่องทางติดต่อสำรอง</div>

      <p class="description">
        หากติดต่อแอดมินผ่าน LINE@ ไม่ได้ชั่วคราว<br>
        สามารถเลือกช่องทางด้านล่างได้เลยนะคะ
      </p>
    </section>

    <!-- Section 4: Contact Channels -->
    <section class="section contact-section">

      <a href="#" class="contact-card line" target="_blank">
        <div class="icon">
          <img src="assets/line.png" alt="LINE">
        </div>
        <div class="contact-text">
          <h2>Line ติดต่อสอบถาม</h2>
          <p>สอบถามข้อมูลทั่วไป</p>
        </div>
        <div class="arrow">›</div>
      </a>

      <a href="#" class="contact-card line" target="_blank">
        <div class="icon">
          <img src="assets/line.png" alt="LINE">
        </div>
        <div class="contact-text">
          <h2>ไลน์สำรอง</h2>
          <p>สำหรับติดต่อเร่งด่วน</p>
        </div>
        <div class="arrow">›</div>
      </a>

      <a href="#" class="contact-card telegram" target="_blank">
        <div class="icon">
          <img src="assets/telegram.png" alt="Telegram">
        </div>
        <div class="contact-text">
          <h2>Telegram</h2>
          <p>ช่องทางสำรอง ตอบกลับไว</p>
        </div>
        <div class="arrow">›</div>
      </a>

      <a href="#" class="contact-card livechat" target="_blank">
        <div class="icon">
          <img src="assets/livechat.png" alt="Live Chat">
        </div>
        <div class="contact-text">
          <h2>Live Chat</h2>
          <p>พูดคุยกับทีมงานทันที</p>
        </div>
        <div class="arrow">›</div>
      </a>

    </section>

  </main>

</body>
</html>
